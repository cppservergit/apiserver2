name: SonarCloud Analysis
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Modern GCC 14 and Dependencies
        run: |
          sudo apt-get update
          # Install GCC 14 for C++23 <print> support
          sudo apt-get install -y g++-14
          sudo apt-get install -y \
            build-essential \
            libcurl4-openssl-dev \
            libjson-c-dev \
            unixodbc-dev \
            libssl-dev

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v4

      - name: Run Build Wrapper
        env:
          TERM: xterm
          # Force the build to use GCC 14
          CXX: g++-14
        run: |
          mkdir -p bw-output
          # Pass the modern compiler to your Makefile
          build-wrapper-linux-x86-64 --out-dir bw-output make release CXX=g++-14

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json